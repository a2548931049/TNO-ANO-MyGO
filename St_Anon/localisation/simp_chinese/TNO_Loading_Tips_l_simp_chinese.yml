l_simp_chinese:
 LOADING_TIP_0:0 "§B世界上每12个人中就会有一支枪。唯一的问题是，如何让其余11人也有枪——最好经由我手。\n- 若天寺祐麦§!"
 LOADING_TIP_1:0 "§B抹茶芭菲。\n- 要乐奈§!"
 LOADING_TIP_2:0 "§B我们真的需要2000名公务员把钱从甲发到乙手上吗？\n- 长崎素世§!"
 LOADING_TIP_3:0 "§B我将成为神明。\n- 丰川祥子§!"
 LOADING_TIP_4:0 "§B我们与战争同在。\n- 八幡海铃，于南非战场上空。§!"
 LOADING_TIP_5:0 "§B他居然敢无视灯！\n- 椎名立希，于第二次西俄战争前§!"
 LOADING_TIP_6:0 "§B身既死兮神以灵，魂魄毅兮为鬼雄。\n- 《九歌·国殇》§!"
 LOADING_TIP_7:0 "§B兵者，国之大事。死生之地，存亡之道，不可不察也。\n- 《孙子》§!"
 LOADING_TIP_8:0 "§B国家昏乱，有忠臣。\n- 《道德经》§!"
 LOADING_TIP_9:0 "§B亲爱的上帝，生活是地狱。但只要还能眞正感到睡意，就总有希望再次成为：一个完—好—无—缺—的人。\n-《九故事》§!"
 LOADING_TIP_10:0 "§B民要攻打民，国要攻打国。多处必有饥荒、地震。这都是灾难的起头。\n-《马太福音》24章7-8节 §!"
 LOADING_TIP_11:0 "§B悲莫悲生离别，乐莫乐新相识，儿女古今情。\n- 辛弃疾§!"
 LOADING_TIP_12:0 "§B我们总以为一旦离开走惯的道路，一切就都完了；其实美好崭新的东西才刚刚开始。有生活就会有幸福。来日方长。\n- 《战争与和平》§!"
 LOADING_TIP_13:0 "§B我已倦于寻找，但仍咬紧着牙齿，顺着茂丛、枯枝、沼泽地，向前直跑。终有一天会走出一条路的。\n- 《在人间》§!"
 LOADING_TIP_14:0 "§B大多数人都是想改变这个世界，但没有人想改变自己。\n- 列夫·托尔斯泰§!"
 LOADING_TIP_15:0 "§B早岁那知世事艰，中原北望气如山。\n- 陆游§!"
 LOADING_TIP_16:0 "§B生而为人，我很抱歉。\n- 《人间失格》§!"
 LOADING_TIP_17:0 "§B青史几行名姓，北邙无数荒丘。\n- 《西江月·道德三皇五帝》§!"
 LOADING_TIP_18:0 "§B兵家之策，惟在不战。\n- 《前汉书》§!"
 LOADING_TIP_19:0 "§B人间万事，毫发常重泰山轻。\n- 辛弃疾§!"

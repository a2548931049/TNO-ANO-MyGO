 # ===== 彩蛋: 丰川祥子 =====

 # 决议
 ANO_easter_egg_category:0 "「Ave Mujica」"
 ANO_summon_the_god:0 "§Y神明降临§!"
 ANO_summon_the_god_desc:0 "在战火纷飞的俄罗斯废土之上，一个传说开始流传——据说有一位来历不明的天才指挥官，她的战术如同乐章般精密，她的意志如同钢铁般坚不可摧。有人说她是从地狱归来的亡灵，有人说她是神明本身。\\n\\n§M「我将成为神明。」§!\\n\\n只要我们足够强大，她就会回应我们的召唤。"

 # 事件
 ANO_easter_1_t:0 "「我将成为神明。」"
 ANO_easter_1_desc:0 "§F她来了。\\n\\n没有人知道她从哪里来。没有人知道她为何而战。她只是出现在了指挥部的门前，黑发如瀑，目光如炬，仿佛世间万物皆在她的棋盘之上。\\n\\n「从今天起，」她淡淡地说，「你们的战争，由我来指挥。」\\n\\n参谋们面面相觑。但当她在沙盘上落下第一枚棋子时，所有人都沉默了——那一刻，他们看到了§Y胜利§!的形状。\\n\\n她的名字是§M丰川祥子§!。\\n\\n有人问她为什么要帮助这个风雨飘摇的小国。她只是微微一笑：\\n\\n§M「因为这里有……值得守护的音乐。」§!§!"
 ANO_easter_1_a:0 "全体起立。"

 # 角色
 ANO_sakiko:0 "丰川祥子"

 # 特质
 Sakiko_theorist_trait:0 "§Y神明的乐章§!——§H科研速度 §G+15%§!、§H组织度 §G+15%§!、§H计划速度 §G+25%§!、§H最大计划 §G+25%§!§!"

 TNO_ugly_american_icon_tt_delayed: "§F俄罗斯的冻土之上，乌鸦何等嚣张，近乎猖狂。日日有人于此处倒下，恰好化作牠们的午餐。一切§w希望§!，似乎都冻结在这一寸寸不化的§<严寒§!里。§!自六年前那场最后的§e搏命一击§!之后，万物又悄然归于沉寂。冰雪连天依旧。§o千年帝国§!依然傲而矗立，仿若国祚万世不熄。这一败，暂且将伤痕以雪封藏。然细细端详，仍有§x血丝§!，正悄悄渗出。\n\n事过境迁，如今§V旧日联盟§!的尸体之上，唯充斥着混乱。野心家和§q各§!§o种§!§e各§!§*样§!的狂人裂土分疆。西伯利亚的铁路被切成数段，每一段都有不同的主人；在乌拉尔山脉的阴影下，在孤立村落或者幸存城墩中，一个个自称§Y'继承者'§!的声音开始浮现。有人高举§x共产主义§!的残旗，誓要重建苏维埃的荣光，再来一次§f十月革命§!；有人怀抱§o民族社会主义§!的光辉事业，称§E苦难§!是对俄罗斯伟大民族的试炼；也有人从白骨堆中爬出，笃信唯有钢铁般的§b意志和手腕§!方能将四分五裂的祖国重新熔铸。但它将以何种面目§g重获新生§!？是§,谁的俄罗斯§!？§R为谁的俄罗斯§!？这些问题如同地雷，埋在每一位自封的§u弥赛亚§!脚下。\n\n众少女割据一方，欲求自保。奈何叹江山如故，千村寥落。骁将§h椎名立希§!立足于§J战火§!，谁知战火无情，竟也灼烧自我。现时她饱受核辐射之折磨。忆昔金戈铁马，此生谁料？心在顿河，身残沃洲。诗人§m高松灯§!虽尽目睹种种惨状，却也无可奈何；§u长崎素世§!更是一头扎进政务堆里；§C千早爱音§!现走访各地，一窥芸芸众生苦相；至于§D要乐§!§f奈§!？作为立希亲自认证的「野猫」简直可谓神出鬼没，正为§g军区§!负责§n情报事宜§!。\n\n良时正可用，行矣莫徒然。一个新的§a机遇§!已临近，一个再统一§b俄罗斯母亲§!的机遇，但也是§e挑战§!。\n\n§M千磨万击还坚劲，任尔东西南北风！§!§!"

 TNO_menupic_tooltip_3: "§F.....不过，就算这个§Q乐团§!还没有名字，但就算§A迷失§!方向我也要§f继续前进§!。今天我也一直很害怕，但我也有一种被鼓励的感觉——我现在能做的，只有§*拼命的歌唱§!！因为我的歌就是§O内心的呐喊§!！"\n\n——§m高松灯§!§!"

 ANO_wrs_pressure_critical:0 "§R西俄革威胁: 危急 — 西俄革势力已全面渗透，我们的政权岌岌可危！§!"
 ANO_wrs_pressure_high_text:0 "§Y西俄革威胁: 严重 — 西俄革的影响力正在蚕食我们的根基§!"
 ANO_wrs_pressure_moderate:0 "§H西俄革威胁: 警戒 — 西俄革的触手开始伸入我们的领地§!"
 ANO_wrs_pressure_safe:0 "§G西俄革威胁: 可控 — 目前西俄革的影响力尚在控制范围内§!"
 ANO_hint_wrs_dangerous:0 "§R警告！西俄革影响力过高，正在严重削弱你的国力。立即通过下方决议压制！§!"
 ANO_hint_can_spend:0 "§G你的影响力足以换取增益或压制西俄革。每14天：阿诺+3，西俄革+5。§!"
 ANO_hint_need_more:0 "§H通过牺牲资源积累影响力来对抗西俄革。每14天：阿诺+3，西俄革+5。§!"
 ANO_suppress_wrs_political:0 "政治施压"
 ANO_suppress_wrs_political_desc:0 "利用积累的政治影响力向亲西俄革的派系施压，动摇他们在本地的根基。\n\n§R花费10影响力§!\n§G西俄革影响力 -15§!"
 ANO_suppress_wrs_propaganda:0 "舆论攻势"
 ANO_suppress_wrs_propaganda_desc:0 "发动针对西俄革的宣传攻势，揭露他们的真面目，削弱民众对他们的同情。\n\n§R花费50政治点数§!\n§G西俄革影响力 -10§!"
 ANO_suppress_wrs_purge:0 "清洗亲革派"
 ANO_suppress_wrs_purge_desc:0 "对潜伏在共和国内部的西俄革同情者进行系统性清洗。手段激进但效果显著。\n\n§R失去5%稳定度 + 500人力§!\n§G西俄革影响力 -20§!"
 ANO_infiltrate_samara:0 "渗透萨马拉"
 ANO_infiltrate_samara_desc:0 "派遣特工潜入萨马拉，建立地下情报网。如果行动成功，不仅能大幅提升我们的影响力，还能严重削弱萨马拉的内政和军事能力。\n\n§R花费10影响力 + 50政治点数§!\n§Y行动耗时60天，成功率60%§!\n§G成功：+20影响力，萨马拉获得严重debuff（360天）§!\n§R失败：-5影响力，稳定度下降§!"
 ANO_influence.10.t:0 "暗影潜入萨马拉"
 ANO_influence.10.desc:0 "我们的特工已经出发前往萨马拉。他们将伪装成难民和流浪商人，穿越危险的废土，渗透进萨马拉的权力核心。\n\n这次行动风险极高——如果被发现，不仅特工会丧命，我们在当地苦心经营的关系网也将毁于一旦。但如果成功，萨马拉的军政体系将从内部被瓦解。\n\n现在，我们只能等待。"
 ANO_influence.10.a:0 "愿暗影庇护他们"
 ANO_infiltration_underway_tt:0 "§Y渗透行动正在进行中……60天后将得到结果§!"
 ANO_influence.11.t:0 "渗透成功！"
 ANO_influence.11.desc:0 "好消息从萨马拉传来——我们的特工成功渗透进了萨马拉的核心机构。他们不仅建立了一个可靠的情报网络，还成功策反了数名关键官员。\n\n萨马拉的军事调动、物资储备、政治动向……一切尽在我们的掌握之中。更重要的是，我们的特工已经开始暗中破坏他们的行政效率和军事部署。\n\n阿诺的名声将因此传遍西俄废土。"
 ANO_influence.11.a:0 "这就是情报战的力量"
 ANO_influence.12.t:0 "渗透失败"
 ANO_influence.12.desc:0 "噩耗传来——我们派往萨马拉的特工小组在边境附近被截获。萨马拉的反间谍部门比我们预想的更加警觉。\n\n虽然特工们在被捕前销毁了大部分机密文件，但这次失败不可避免地暴露了我们的意图。我们在萨马拉的潜在盟友纷纷与我们划清界限，之前的努力付诸东流。\n\n这是一个沉痛的教训。"
 ANO_influence.12.a:0 "……下次会更谨慎"
 ANO_wrs_pressure_low:0 "西俄革渗透：警戒"
 ANO_wrs_pressure_low_desc:0 "西俄革命阵线的影响力正在渗入我们的社会。亲革派的活动开始对政府的施政效率产生干扰。"
 ANO_wrs_pressure_medium:0 "西俄革渗透：严重"
 ANO_wrs_pressure_medium_desc:0 "西俄革的影响力已经深入我们的行政和经济体系。工厂里出现了罢工，研究机构中有人公开宣扬革命思想。如果不加以遏制，后果不堪设想。"
 ANO_wrs_pressure_high:0 "西俄革渗透：危急"
 ANO_wrs_pressure_high_desc:0 "西俄革命阵线几乎控制了共和国的一半！政府机构中到处是他们的人，军队的忠诚度也在动摇。我们必须立即采取行动，否则阿诺共和国将名存实亡。"
 SAM_infiltrated_by_ANO:0 "内部渗透"
 SAM_infiltrated_by_ANO_desc:0 "外部势力的特工已经渗透进了萨马拉的核心机构，行政效率严重下降，军事部署频繁泄露。"

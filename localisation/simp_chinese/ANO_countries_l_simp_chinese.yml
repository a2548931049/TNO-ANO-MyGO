 ANO_remnant_coup_warning.t:0 "残党蠢动"
 ANO_remnant_coup_warning.desc:0 "来自科斯特罗马与沃洛格达乡间的报告正在变得一致：伊万诺夫旧部不再只是流窜匪帮，他们已经重新串联起来。仓库失火、哨所失联、军官遭遇暗杀，所有迹象都指向同一件事——残党即将发动最后一击。\n\n十四日。我们只剩十四日。"
 ANO_remnant_coup_warning.a:0 "阴影在靠近。"
 ANO_remnant_coup.t:0 "灯火熄灭"
 ANO_remnant_coup.desc:0 "政变在拂晓前爆发。第一批枪声来自军区司令部外围，第二批枪声来自电台楼下。高松灯没有来得及完成最后一首诗；当立希赶到时，走廊里只剩下硝烟、血迹和被踩碎的乐谱。\n\n伊万诺夫残党被暂时击退，但灯已经死去。立希接过残破的军区，战争将以另一种方式继续。\n\n§R立希线尚未开发，本节点暂视为游戏结束。§!"
 ANO_remnant_coup.a:0 "为什么会变成这样……"
 ANO_central_takeover_warning.t:0 "中央命令"
 ANO_central_takeover_warning.desc:0 "西俄罗斯革命阵线中央的电报一封接着一封，措辞从协商变成训令，从训令变成最后通牒。沃洛格达仍然名义上属于革命阵线，而中央已经决定收回这个越来越不听话的军区。\n\n十四日后，接管委员会将抵达。"
 ANO_central_takeover_warning.a:0 "他们要来了。"
 ANO_central_takeover.t:0 "沃洛格达被接管"
 ANO_central_takeover.desc:0 "西俄革的红旗重新升上沃洛格达。中央接管委员会进入司令部，接收档案、仓库、兵站和电台。军区被取消，阿诺的短暂自治成为历史。\n\n从今天起，沃洛格达重新归于西俄罗斯革命阵线。"
 ANO_central_takeover.a:0 "回到中央。"
 ANO_influence_panel_title:0 "大博弈"
 ANO_influence_panel_desc:0 "沃洛格达-科斯特罗马地带像一张巨大的棋盘。阿诺军区与西俄革旧部都在争夺主动权；每十四日，双方影响力都会改变。"

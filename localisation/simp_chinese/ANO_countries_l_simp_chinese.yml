 # ===== 影响力决议系统 =====

 ANO_influence_category:0 "权力博弈"
 ANO_influence_category_desc:0 "阿诺自由共和国与西俄革命阵线之间的权力角逐。西俄革的影响力会持续增长，如果放任不管将严重削弱我们。通过决议积累自身影响力，并花费影响力压制西俄革。"
 ANO_influence_political_investment:0 "政治投资"
 ANO_influence_political_investment_desc:0 "将宝贵的政治资本投入到外交渠道中，换取周边势力对我们的关注。\n§R花费100政治点数§!\n§G获得10影响力§!"
 ANO_influence_public_mobilization:0 "民心动员"
 ANO_influence_public_mobilization_desc:0 "发动民众进行大规模的请愿和游行，向外界展示我们人民的意志。虽然这会短暂动摇社会秩序。\n§R失去5%稳定度§!\n§G获得10影响力§!"
 ANO_influence_war_propaganda:0 "战时宣传"
 ANO_influence_war_propaganda_desc:0 "通过广播和传单宣传我们的抗争故事，引起外界同情。但这意味着将战争的残酷真相公之于众，会削弱人们的战斗意志。\n§R失去5%战争支持度§!\n§G获得10影响力§!"
 ANO_influence_manpower_levy:0 "人力征调"
 ANO_influence_manpower_levy_desc:0 "派遣一批精干人员前往周边势力作为联络使团，以劳动力换取政治上的认可。\n§R失去5000人力§!\n§G获得10影响力§!"
 ANO_influence_diplomatic_recognition:0 "争取外交承认"
 ANO_influence_diplomatic_recognition_desc:0 "利用积累的影响力正式获得周边军阀的外交承认，使阿诺共和国成为被认可的西俄势力。这将带来永久的政治和经济收益。\n§R花费15影响力§!\n§G获得永久性外交承认（政治点数+10%，消费品-5%，稳定度+5%）§!"
 ANO_influence_attract_investment:0 "吸引投资"
 ANO_influence_attract_investment_desc:0 "以影响力换取外部资源和技术的流入，暂时性地提升我们的工业产能。\n§R花费10影响力§!\n§G工厂产出+10%（180天）§!"
 ANO_influence_military_advisors:0 "聘请军事顾问"
 ANO_influence_military_advisors_desc:0 "邀请经验丰富的军事顾问协助训练部队，短时间内显著提高军队战斗力。\n§R花费10影响力§!\n§G陆军攻击/防御+10%，组织度恢复+5%（180天）§!"
 ANO_influence_research_cooperation:0 "科研合作"
 ANO_influence_research_cooperation_desc:0 "与邻近势力交换技术资料，加速我们的研发进程。\n§R花费10影响力§!\n§G科研速度+10%（180天）§!"
 ANO_influence_trade_network:0 "建立贸易网络"
 ANO_influence_trade_network_desc:0 "利用外交影响力打通商路，获取建设所需的稀缺材料。\n§R花费10影响力§!\n§G建造速度+15%，基础设施建造速度+10%（180天）§!"

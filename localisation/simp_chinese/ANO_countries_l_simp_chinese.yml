 ANO_diplomatic_recognition:0 "外交承认"
 ANO_diplomatic_recognition_desc:0 "阿诺自由共和国已被周边势力正式承认为一个合法的西俄政权。这不仅带来了政治上的稳定，也打开了贸易和外交的大门。"
 ANO_investment_boost:0 "外部投资涌入"
 ANO_investment_boost_desc:0 "来自周边势力的投资正在流入我们的工厂，暂时性地提高了生产效率。"
 ANO_military_advisor_boost:0 "军事顾问团"
 ANO_military_advisor_boost_desc:0 "经验丰富的军事顾问正在协助训练我们的部队，显著提升了军队的战斗力。"
 ANO_research_cooperation_boost:0 "科研合作协议"
 ANO_research_cooperation_boost_desc:0 "与邻近势力的技术交流正在加速我们的研发进程。"
 ANO_trade_network_boost:0 "贸易网络"
 ANO_trade_network_boost_desc:0 "通过影响力建立的贸易网络正在为我们带来稀缺的建设材料。"

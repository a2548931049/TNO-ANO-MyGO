 ANO_influence_political_investment:0 "政治投资"
 ANO_influence_political_investment_desc:0 "将宝贵的政治资本投入到行政、军警和地方协调中，暂时压低两股威胁。\n§R花费100政治点数§!\n§G30日后：残党力量-75，中央力量-75§!"
 ANO_influence_public_mobilization:0 "民心动员"
 ANO_influence_public_mobilization_desc:0 "动员民众举报残党、守卫仓库与铁路线。群众政治会刺激中央警惕。\n§R失去5%稳定度§!\n§G30日后：残党力量-100，中央力量+25§!"
 ANO_influence_war_propaganda:0 "战时宣传"
 ANO_influence_war_propaganda_desc:0 "向西俄革中央强调军区仍在前线承担责任，以换取暂时的回旋空间。这会削弱民众战斗意志，也会让残党获得活动机会。\n§R失去5%战争支持度§!\n§G30日后：中央力量-100，残党力量+25§!"
 ANO_influence_manpower_levy:0 "人力征调"
 ANO_influence_manpower_levy_desc:0 "调集可靠人手加强巡逻、清查仓库与护送车队。\n§R失去5000人力§!\n§G30日后：残党力量-75§!"
 ANO_influence_diplomatic_recognition:0 "争取外交承认"
 ANO_influence_diplomatic_recognition_desc:0 "以政治资本换取周边势力承认沃洛格达的自治地位。外部承认会同时压低残党与中央的行动空间。\n§R花费100政治点数§!\n§G获得永久性外交承认，并使两股力量各-50§!"
 ANO_influence_attract_investment:0 "吸引投资"
 ANO_influence_attract_investment_desc:0 "以政治资本换取外部资源和技术流入，暂时提升工业产能，并缓解中央对军区经济失控的担忧。\n§R花费50政治点数§!\n§G中央力量-50，工厂产出+10%（180天）§!"
 ANO_influence_military_advisors:0 "聘请军事顾问"
 ANO_influence_military_advisors_desc:0 "邀请可靠军官整训部队，强化军区对基层武装的控制。\n§R花费50政治点数§!\n§G残党力量-50，陆军攻击/防御+10%，组织度恢复+5%（180天）§!"
 ANO_influence_research_cooperation:0 "科研合作"
 ANO_influence_research_cooperation_desc:0 "与邻近势力交换技术资料，加速我们的研发进程。\n§R花费50政治点数§!\n§G科研速度+10%（180天）§!"
 ANO_influence_trade_network:0 "建立贸易网络"
 ANO_influence_trade_network_desc:0 "打通商路，获取建设所需的稀缺材料。\n§R花费50政治点数§!\n§G建造速度+15%，基础设施建造速度+10%（180天）§!"

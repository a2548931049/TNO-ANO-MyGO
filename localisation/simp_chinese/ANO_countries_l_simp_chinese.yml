 # ===== 民族精神 =====

 ANO_refugee_crisis:0 "难民危机"
 ANO_refugee_crisis_desc:0 "科斯特罗马的铁路载着从废土里逃出来的人。他们有冻伤、病痛、被核尘染黑的肺，但对他们而言，这里还有一线希望。这是赐予我们的礼物，也是一个§R定时炸弹§!。"
 ANO_double_headed_regime:0 "双头政权"
 ANO_double_headed_regime_desc:0 "共和国既不是传统的军政府，也不是类似美国的民主共和国。它是一辆在末世里狂奔的列车，我们根本无法知道终点是什么，只能迷途而行。"

 # ===== 国策本地化 =====

 ANO_stand_in_the_cold:0 "于寒风中而立"
 ANO_another_year_in_despair:0 "绝境之中又一年"
 ANO_another_year_in_despair_desc:0 "在德国空军的阴影下，我们又挺过了一年。尽管补给匮乏，尽管寒风刺骨，但沃洛格达依然屹立不倒。我们需要整合现有的资源，为了生存，也为了那一丝渺茫的希望。"
 ANO_remember_the_west_russian_war:0 "铭记西俄战争"
 ANO_remember_the_west_russian_war_desc:0 "那场战争留下的不仅仅是伤痛，还有宝贵的经验。我们需要重拾那些在血火中淬炼出的战术，让我们的士兵知道他们为何而战，以及如何活下去。"
 ANO_counter_luftwaffe_bombing:0 "对抗德国空军的轰炸"
 ANO_counter_luftwaffe_terror_bombing:0 "对抗德国空军骇人轰炸"
 ANO_counter_luftwaffe_terror_bombing_desc:0 "德国佬把轰炸我们要塞当成了一种消遣，但我们受够了。我们将建立更密集的防空网络，把每一颗子弹都送进那些纳粹秃鹫的引擎里。"
 ANO_remnants_watching:0 "……还有虎视眈眈的残党"
 ANO_remnants_watching_desc:0 "外部的威胁尚未解除，内部的隐患却已滋生。旧时代的残党躲在阴影里，贪婪地盯着我们要塞的控制权。我们必须保持警惕，在他们动手之前先发制人。"
 ANO_crush_slavic_movement:0 "剿灭斯拉夫运动组织"
 ANO_crush_slavic_movement_desc:0 "这群极端的疯子只会把我们引向毁灭。既然他们拒绝听从理性的声音，那我们就用枪炮来回答他们的狂热。"
 ANO_people_who_wont_be_slaves:0 "不甘为奴之人"
 ANO_people_who_wont_be_slaves_desc:0 "沃洛格达的人民不是纳粹的奴隶，也不是军阀的耗材。我们要证明，即使在这片被遗弃的土地上，尊严依然存在。"
 ANO_boost_public_confidence:0 "提振人民信心"
 ANO_boost_public_confidence_desc:0 "恐慌比饥饿更致命。我们需要通过宣传和实际行动告诉大家，政府还在运作，秩序依然存在。"
 ANO_rebuild_our_needs:0 "重建我们所需"
 ANO_rebuild_our_needs_desc:0 "战争摧毁了一切，但我们必须从废墟中捡起砖块。优先恢复基础民生设施，让人活下去才是硬道理。"
 ANO_soviet_arms:0 "苏联军火"
 ANO_soviet_arms_desc:0 "仓库里还堆积着旧红军遗留的装备，虽然有些生锈，但只要擦拭干净，它们依然能要了敌人的命。"
 ANO_strengthen_law_enforcement:0 "强化执法机构"
 ANO_strengthen_law_enforcement_desc:0 "乱世用重典。我们需要扩充警察队伍，赋予他们更大的权力，以确保没有任何人敢挑战沃洛格达的法律。"
 ANO_investigate_traitors:0 "调查变节者"
 ANO_investigate_traitors_desc:0 "谁在向外传递情报？谁在私藏物资？秘密警察将深入每一个街区，把蛀虫从我们的队伍中挖出来。"
 ANO_expand_army:0 "扩充军队"
 ANO_expand_army_desc:0 "单纯的防守无法带来和平。我们需要招募更多的新兵，即使只有简陋的装备，数量本身就是一种质量。"
 ANO_empower_chihaya_anon:0 "赋权千早爱音"
 ANO_empower_chihaya_anon_desc:0 "有人质疑为什么要在这种时候让一位从"异世界"来的少女掌握权力？也许正是她那种不知天高地厚的乐观，才是这个绝望世界最需要的解药。爱音素，启动！"
 ANO_cooperate_with_wrrf:0 "与革命阵线合作？"
 ANO_cooperate_with_wrrf_desc:0 "虽然我们理念不同，但面对共同的敌人，或许我们可以和西边的同志们谈谈。当然，要在枪上膛的情况下谈。"
 ANO_strike_ss_terrorists:0 "打击党卫军恐怖分子"
 ANO_strike_ss_terrorists_desc:0 "党卫军的渗透者试图在我们的土地上制造混乱。这一次，我们将主动出击，彻底粉碎他们的恐怖网络。"
 ANO_let_them_build:0 "让他们去建设"
 ANO_let_them_build_desc:0 "既然大家都充满了干劲（或许是被爱音逼的），那就让这股力量转化为生产力吧。每一个新工厂都是我们复兴的基石。"
 ANO_rebuild_local_power_plant:0 "重建本地发电厂"
 ANO_rebuild_local_power_plant_desc:0 "电力就是文明的象征。当灯光重新亮起的那一刻，沃洛格达将不再是一片死寂的废土。"
 ANO_back_on_track:0 "重回正轨"
 ANO_back_on_track_desc:0 "我们在深渊的边缘徘徊了太久，但现在，我们终于站稳了脚跟。混乱已经结束，秩序已经重建，沃洛格达的列车已经重新驶上正轨，驶向未知的未来。"
 ANO_now_or_never:0 "机不可失"
 ANO_unleash_the_warhawks:0 "释放战鹰"
 ANO_working_overtime:0 "加班加点"
 ANO_develop_resources:0 "开发资源"
 ANO_call_to_arkhangelsk:0 "呼吁阿尔汉格尔斯克"
 ANO_neighbors:0 "邻居"
 ANO_lingering_on:0 "苟延残喘"
 ANO_counterattack_gorky:0 "反击高尔基"
 ANO_take_over_gorky:0 "接收高尔基"
 ANO_trial_of_traitors:0 "对背叛者的审判"
 ANO_look_east:0 "向东看"
 ANO_go_west:0 "向西进"

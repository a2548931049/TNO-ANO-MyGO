 # ===== 影响力决议系统 =====

 ANO_influence_category:0 "内忧外患"
 ANO_influence_category_desc:0 "沃洛格达军区夹在伊万诺夫残党与西俄罗斯革命阵线中央之间。任一方力量达到上限，都将触发十四日倒计时，并把灯的政权推向终点。"
 ANO_internal_external_title:0 "内忧 外患"
 ANO_internal_external_desc:0 "沃洛格达的命运悬在两股力量之间。伊万诺夫残党潜伏在荒林、仓库与军营阴影中；西俄革中央则以命令、补给和名义压迫着军区。"
 ANO_remnant_power_name:0 "伊万诺夫残党"
 ANO_remnant_power_value:0 "力量：[?ANO_remnant_power|0] / 1000"
 ANO_central_power_name:0 "西俄罗斯革命阵线中央"

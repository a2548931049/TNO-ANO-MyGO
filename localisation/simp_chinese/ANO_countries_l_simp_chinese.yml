 # ===== 领袖描述 =====

 POLITICS_tomorin_DESC:0 "當西俄羅斯革命陣線因德國核打擊和內訌走向分裂時，沒人看好這個溫柔，膽怯的異鄉人。她既沒有深厚的家世，也沒有顯赫的軍功。在最黑暗的歲月裡，高松燈無異爲西俄羅斯革命陣線付出了近乎一切，甚至比某些陣線元老的貢獻還大；面對那支離破碎的，名爲俄羅斯的屍體上，高松燈也被視爲軟弱與妥協的象徵。國內甚至有一部分人認為日本人都要接受懲處，以報日本在遠東的趁火打劫。曆史卻意外的青睞了這位外來者。高松燈即不追求前蘇聯式的暴力革命，也不要求雅利安兄弟會或黑色聯盟般的種族滅絶。她毅然決然的走進了貧民窟和工廠，傾聽那些在戰火和嚴寒中人民的聲音，用音樂喚起人民對生活的希望，讓彼此仇恨的陣營坐在同一張桌子上......但諷刺的現實是，在俄羅斯軍閥的殘酷鬥爭之下，人命被一個個軍閥頭子們視爲最不值錢的一次性用品。"
 POLITICS_TAKI_DESC:0 "西俄羅斯戰爭期間，在莫斯科被核彈夷平後，椎名立希第一個衝進去拯救尚未嚥氣的那些士兵，而在撤退時，她堅守在祖耶沃的防線直到所有部隊都撤出，因而士兵們都稱其為「祖耶沃之狼」只是，立希終究還是凡人，輻射病的加重，國防軍的壓力，以及天上的鐵翼都在將死神拉近，在高爾基的這幾年立希看著陣線的混亂發誓，總有一天要讓德國人和那些叛國者付出代價"

 # ===== Country Info =====

 TNO_COUNTRY_INFO_BUTTON_TEXT_ANO:0 "恆久迷失"
 ANO_CountryInfo_Folder.101:0 "故往旧事"
 ANO_CountryInfo_Content.1:0 "昔时之荒冢……"
 ANO_CountryInfo_Content_desc.1:0 "第二次世界大战将旧秩序化为尘土，日耳曼雄鹰的利爪和旭日帝国的刺刀玩弄着昔日死敌的尸体，在它们身上敲骨吸髓，化为自己驱动暴政的燃料。家破人亡之际，丰川家族之女丰川祥子带着crychic的队友们踏上了前往中立国避难的道路。然而，在符拉迪沃斯托克边境，五人遭到逮捕，受尽苏军兵痞审讯折磨，在狭小的牢狱里抱团取暖。古德里安的装甲集群的冲锋速度比谁想象的都快。红旗落地，苏联解体，布哈林销声匿迹。远东白军残党在哥萨克阿塔曼谢苗诺夫的带领下一呼百应，跟着日军从哈尔滨杀进苏联远东，五人得以在苏军守卫松懈之时趁乱逃出陷入混乱的战俘营。然而，为了吸引苏军兵痞的注意，祥子和若叶睦不得不与剩下三人分离..."
 ANO_CountryInfo_Content.2:0 "伟大征程之终"
 ANO_CountryInfo_Content_desc.2:0 "苏维埃社会主义共和国联盟的旗帜在尘土之中倾倒，但仍有义士挺身而出反抗德意志的极权统治。亚历山大·叶戈罗夫便是其中之一。阿尔汉格尔斯克-阿斯特拉罕线的一声炮响打破了莫斯科专员辖区的宁静，西俄罗斯战争在多方支援下爆发。此刻，在革命阵线中服役的高松灯等人与OFN记者千早爱音结为挚友，还与来俄罗斯废土探险的要乐奈组成一个崭新的乐队。一切都往美好的方向发展，直至纳粹的核子烈焰摧毁了一切。莫斯科专员辖区化为一片火海，在前线救人心切的椎名立希不幸被核污染侵蚀。西俄罗斯革命阵线的情况同样糟糕，民主派、俄解军、反动沙皇、纳粹邪教徒——分裂势力与通敌者撕碎本就奄奄一息的西俄革，大将伊万·切尔尼亚霍夫斯基不幸在核爆中殉国。就连西俄革的大后方沃洛格达也被哗变的叛将瓦西里·伊万诺夫占领。为拯救最后反抗德国的火种，椎名立希等人发动了一场政变，在夜色中将伊万诺夫打成了筛子....."
 ANO_CountryInfo_Folder.102:0 "军区现状"
 ANO_CountryInfo_Content.3:0 "....盛开明日的鲜花"
 ANO_CountryInfo_Content_desc.3:0 "尽管沃洛格达"军区"效忠西俄革，然而面对连吃饭都要与魔鬼和叛徒做交易的中央，可想而知，这种"效忠"仅仅停留于表面。在椎名立希因核辐射侵蚀退居二线后，沃洛格达与高松灯本人的军阀国度无异。军区基本继承了中立国的角色，每天，从铁丝网和河流的另一边，军区日复一日的接收从莫斯科专员辖区潜逃而来的难民。这些人的素质参差不齐——耗尽一切盘缠也要逃离雅利安屠刀的难民，有利可图的奸商，甚至是试图阻止俄罗斯再统一的盖世太保和勃艮第的党卫军敢死队。因此，一套针对难民的律法迫在眉睫。"
 ANO_CountryInfo_Content.4:0 "匪患"
 ANO_CountryInfo_Content_desc.4:0 "难民带来的危机不仅仅只有外患，还有内忧。自政变成功以来，伊万诺夫的残党们躲入了深山老林中，静静等待着沃洛格达最薄弱的时刻。混乱的难民本就压垮了军警部门，如果危机无法被妥善解决，伊万诺夫的残党们将再次揭竿而起，将枪口对准高松灯和她的军阀政权。届时，沃洛格达将步入十八层地狱，亦浴火重生，或永不复还。国之生死，乐队兴亡。"
 ANO_CountryInfo_Content.5:0 "再续革命"
 ANO_CountryInfo_Content_desc.5:0 "当然，高松灯与她的团队拥有十足的把握稳住沃洛格达的风帆，让这艘大船不在军阀乱世之中倾覆。她们将伺机而动，夺舍羸弱的革命阵线，征服与整合她们所见的一切，将胜利的火种从沃洛格达一路带到勘察加半岛。此时，大日耳曼国的重症病房里，阿道夫·希特勒，雅利安人的元首距离死亡也只有一步之遥。各大派系的领导人们静候着那位大独裁者的陨落，瞪着欧洲之王的宝座目露饥渴凶光；专员辖区中被奴役至死的奴隶们夙兴夜寐，卧薪尝胆，静待时机，直至守得云开见月明之日。无论是曾经闪耀的首都莫斯科，还是遥远的海港符拉迪沃斯托克，皆已落入敌手。所有人心知肚明，俄罗斯必须统一——不惜一切代价，一次真正的统一。这是命运赐予高松灯的机遇，也是整个俄罗斯民族唯一的一次机会。"

